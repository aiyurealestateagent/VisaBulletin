name: Scrape Visa Bulletin

on:
  # Monthly cron: 10th-20th of each month at 12:00 UTC
  schedule:
    - cron: "0 12 10 * *"
    - cron: "0 12 11 * *"
    - cron: "0 12 12 * *"
    - cron: "0 12 13 * *"
    - cron: "0 12 14 * *"
    - cron: "0 12 15 * *"
    - cron: "0 12 16 * *"
    - cron: "0 12 17 * *"
    - cron: "0 12 18 * *"
    - cron: "0 12 19 * *"
    - cron: "0 12 20 * *"

  # Manual trigger for backfill or ad-hoc scrape
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "scrape"
        type: choice
        options:
          - scrape
          - backfill

permissions:
  contents: write  # 需要 push 权限

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Scrape latest bulletin
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'scrape')
        run: npm run scrape

      - name: Backfill historical data
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'backfill'
        run: npm run backfill
        timeout-minutes: 30

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update visa bulletin data $(date -u +%Y-%m-%d)"
          git push
